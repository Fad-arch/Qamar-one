<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking - Qamar One</title>
<link rel="stylesheet" href="GFHD.css">
</head>

<body>

<header>
    <img src="logo.png" alt="logo" class="logo" width="100">
    <nav>
        <a href="index3.html">Home</a>
        <a href="rooms.html">Rooms</a>
        <a href="booking.html">Booking</a>
        <a href="gallery.html">Gallery</a>
        <a href="evaluation.html">Evaluation</a>
    </nav>
</header>

<div class="booking-container">

    <h1>Book Your Stay</h1>

    <form id="bookingForm">

        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>

        <label>Check-in</label>
        <input type="date" id="checkin" required>

        <label>Check-out</label>
        <input type="date" id="checkout" required>

        <label>Room Type</label>
        <select id="room" required>
            <option value="">Select Room</option>
            <option value="1500">Pool View - 1500 DA</option>
            <option value="2500">Royal Suite - 2500 DA</option>
            <option value="1200">Deluxe Room - 1200 DA</option>
        </select>

        <label>Guests</label>
        <input type="number" min="1" max="6" required>

        <h2 id="total">Total: 0 DA</h2>

        <button type="submit">Confirm Booking</button>

    </form>

</div>

<!-- Popup Confirmation -->
<div class="popup" id="popup">
    <div class="popup-content">
        <h2>Booking Confirmed 
        </h2>
        <p>Your reservation has been successfully completed!</p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<script src="fgjbjk.js"></script>
</body>
</html>
